<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TalaanScan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; background: #F8FAFC; display: flex; height: 100vh; align-items: center; justify-content: center; }
        .auth-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { color: #2563EB; font-weight: 700; font-size: 1.5rem; text-decoration: none; display: block; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid #E2E8F0; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2563EB; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background: #1D4ED8; }
        p { color: #64748B; font-size: 0.875rem; margin-top: 20px;}
        a { color: #2563EB; text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <a href="index.html" class="logo">TalaanScan</a>
        <h2>Welcome back</h2>
        <p style="margin-top: 0; margin-bottom: 30px;">Please enter your details.</p>
        <form>
            <input type="email" placeholder="Email address" required>
            <input type="password" placeholder="Password" required>
            <button type="button" onclick="window.location.href='dashboard/dashboard.html'">Sign In</button>
        </form>
        <p>Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
</body>
</html>
