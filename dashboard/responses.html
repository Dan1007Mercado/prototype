<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responses | TalaanScan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body class="dashboard-layout">

    <main class="main-content">
        <header class="top-navbar">
            <div class="breadcrumbs">
                <a href="dashboard.html">Home</a> <i class="fas fa-chevron-right"></i>
                <span class="current">Responses Inbox</span>
            </div>
        </header>

        <div class="page-container">
            <div class="page-header flex-between align-center mb-4">
                <div>
                    <h1 class="page-title">Scanned Responses</h1>
                    <p class="page-subtitle">Incoming data synchronized from mobile enumerators.</p>
                </div>
                <a href="exports.html" class="btn btn-outline"><i class="fas fa-file-export"></i> Export Data</a>
            </div>

            <div class="content-card">
                <div class="flex-between mb-4 toolbar-grid" style="gap: 16px;">
                    <select class="form-select" id="surveyFilter" style="min-width: 250px;">
                        <option value="">All surveys</option>
                    </select>
                    <div style="flex: 1; position: relative;">
                        <i class="fas fa-search input-icon"></i>
                        <input type="text" class="form-input with-icon w-100" placeholder="Search by Respondent ID or Enumerator...">
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Scan ID</th>
                                <th>Survey Campaign</th>
                                <th>Scanned By</th>
                                <th>Sync Date</th>
                                <th>Confidence</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="responsesBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
</body>
</html>
