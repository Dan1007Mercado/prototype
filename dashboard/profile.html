<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Profile | TalaanScan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/components.css">
    <style>
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-main);
            font-size: 0.95rem;
        }
        
        .form-input, .form-textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: var(--text-main);
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        
        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .profile-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body class="dashboard-layout">

    <main class="main-content">
        <header class="top-navbar">
            <div class="breadcrumbs">
                <a href="dashboard.html">Home</a> <i class="fas fa-chevron-right"></i>
                <span class="current">Profile</span>
            </div>
        </header>

        <div class="page-container">
            <div class="page-header mb-4">
                <h1 class="page-title">Account Profile</h1>
                <p class="page-subtitle">Manage your account information and preferences.</p>
            </div>

            <div class="content-card">
                <div class="profile-header">
                    <div class="profile-avatar">AD</div>
                    <div>
                        <h2 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 4px;">Admin User</h2>
                        <p style="color: var(--text-muted); font-size: 0.95rem;">Administrator • admin@talanscan.local</p>
                    </div>
                </div>

                <form style="max-width: 600px;">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">First Name</label>
                            <input type="text" class="form-input" value="Admin" placeholder="Enter first name">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Last Name</label>
                            <input type="text" class="form-input" value="User" placeholder="Enter last name">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" value="admin@talanscan.local" placeholder="your.email@example.com">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Phone Number</label>
                        <input type="tel" class="form-input" placeholder="+1 (555) 000-0000">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Bio</label>
                        <textarea class="form-textarea" placeholder="Tell us about yourself..."></textarea>
                    </div>

                    <div style="display: flex; gap: 12px; margin-top: 32px;">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Save Changes</button>
                        <button type="button" class="btn btn-outline"><i class="fas fa-times"></i> Cancel</button>
                    </div>
                </form>
            </div>

            <div class="content-card" style="margin-top: 24px;">
                <h3 style="font-size: 1.1rem; font-weight: 600; margin-bottom: 16px;">Password & Security</h3>
                <div style="padding: 20px 0; border-bottom: 1px solid var(--border-color); margin-bottom: 20px;">
                    <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 12px;">Last changed 90 days ago</p>
                    <button type="button" class="btn btn-outline"><i class="fas fa-key"></i> Change Password</button>
                </div>

                <h4 style="font-weight: 600; margin-bottom: 12px; color: var(--text-main);">Two-Factor Authentication</h4>
                <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 16px;">Enhance your account security with 2FA</p>
                <button type="button" class="btn btn-outline"><i class="fas fa-shield"></i> Enable 2FA</button>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
</body>
</html>
