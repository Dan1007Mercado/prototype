<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TalaanScan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/components.css">
    
    <style>
        /* Additional spacing for dashboard */
        .dashboard-spacer {
            height: 1px;
        }
        
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 8px;
        }
        
        .stats-grid {
            margin-bottom: 2px;
        }
        
        .content-card {
            margin-bottom: 0;
        }
        
        /* Activity list styling */
        .activity-list {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
            min-height: 200px;
        }
        
        .activity-item {
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
        }
        
        .activity-item:hover {
            background: var(--bg-main);
        }
        
        .activity-item .activity-icon {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--primary-soft);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .activity-item .activity-content {
            flex: 1;
        }
        
        .activity-item .activity-title {
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-main);
        }
        
        .activity-item .activity-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        @media (max-width: 1024px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            
            .page-header {
                flex-direction: column;
                align-items: flex-start !important;
                gap: 16px;
            }
            
            .page-header > div:last-child {
                width: 100%;
            }
            
            .page-header .btn {
                flex: 1;
                justify-content: center;
            }
        }
        
        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="dashboard-layout">

    <main class="main-content">
        <header class="top-navbar">
            <div class="breadcrumbs">
                <span class="current">Dashboard Overview</span>
            </div>
            <div class="nav-right" style="display: flex; gap: 16px; align-items: center;">
                <button class="btn-icon"><i class="fas fa-search"></i></button>
                <button class="btn-icon"><i class="fas fa-bell"></i></button>
                <div style="width: 36px; height: 36px; border-radius: 50%; overflow: hidden; border: 2px solid var(--border-color);">
                    <img src="https://placehold.co/36x36/2563EB/FFFFFF?text=AD" alt="Admin" style="width: 100%; height: 100%;">
                </div>
            </div>
        </header>

        <div class="page-container">
            <!-- Page Header -->
            <div class="page-header flex-between align-center mb-4">
                <div>
                    <h1 class="page-title">Welcome back, Admin!</h1>
                    <p class="page-subtitle">Here is what's happening with your surveys today.</p>
                </div>
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <a href="upload-questionnaire.html" class="btn btn-outline"><i class="fas fa-magic"></i> AI Convert</a>
                    <a href="create-survey.html" class="btn btn-primary"><i class="fas fa-plus"></i> New Survey</a>
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background: #E0E7FF; color: var(--primary);"><i class="fas fa-clipboard-list"></i></div>
                    <div class="stat-details">
                        <h3>Active Surveys</h3>
                        <p class="stat-value" id="metricActiveSurveys">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #DCFCE7; color: #10B981;"><i class="fas fa-users"></i></div>
                    <div class="stat-details">
                        <h3>Total Responses</h3>
                        <p class="stat-value" id="metricResponses">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #FEF3C7; color: #F59E0B;"><i class="fas fa-file-alt"></i></div>
                    <div class="stat-details">
                        <h3>OMR Templates</h3>
                        <p class="stat-value" id="metricTemplates">0</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #EDE9FE; color: #7C3AED;"><i class="fas fa-wand-magic-sparkles"></i></div>
                    <div class="stat-details">
                        <h3>Conversions</h3>
                        <p class="stat-value" id="metricConversions">0</p>
                    </div>
                </div>
            </div>

            <!-- Spacer after stats -->
            <div class="dashboard-spacer"></div>

            <!-- Grid Layout -->
            <div class="grid-layout">
                <!-- Recent Surveys Card -->
                <div class="content-card">
                    <div class="flex-between mb-4">
                        <h2>Recent Surveys</h2>
                        <a href="surveys.html" class="btn btn-outline btn-sm">View All</a>
                    </div>
                    <div style="overflow-x: auto;">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Survey Name</th>
                                    <th>Status</th>
                                    <th>Responses</th>
                                    <th>Created</th>
                                </tr>
                            </thead>
                            <tbody id="dashboardRecentSurveys"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Recent Activity Card -->
                <div class="content-card">
                    <div class="flex-between mb-4">
                        <h2>Recent Activity</h2>
                        <a href="conversion-dashboard.html" class="btn btn-outline btn-sm">Queue</a>
                    </div>
                    <div id="dashboardActivity" class="activity-list"></div>
                    <a href="upload-questionnaire.html" class="btn btn-primary w-100" style="margin-top: 20px;">
                        <i class="fas fa-magic"></i> Convert Questionnaire 
                        <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
                    </a>
                </div>
            </div>

            <!-- Spacer after grid -->
            <div class="dashboard-spacer"></div>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script>
        // Dashboard specific functionality
        document.addEventListener('DOMContentLoaded', function() {
            // Populate metrics from app.js state
            if (window.TalanScan && window.TalanScan.state) {
                const state = window.TalanScan.state;
                
                // Update metrics
                const activeSurveys = state.surveys.filter(s => s.status === 'active').length;
                const totalResponses = state.surveys.reduce((sum, s) => sum + s.responses, 0);
                const totalTemplates = state.templates.length;
                const totalConversions = state.conversions.length;
                
                document.getElementById('metricActiveSurveys').textContent = activeSurveys;
                document.getElementById('metricResponses').textContent = totalResponses.toLocaleString();
                document.getElementById('metricTemplates').textContent = totalTemplates;
                document.getElementById('metricConversions').textContent = totalConversions;
                
                // Populate recent surveys
                const recentSurveys = state.surveys.slice(0, 4);
                const tbody = document.getElementById('dashboardRecentSurveys');
                if (tbody) {
                    tbody.innerHTML = recentSurveys.map(survey => `
                        <tr>
                            <td><strong>${survey.name}</strong></td>
                            <td><span class="badge-status status-${survey.status}">${survey.status}</span></td>
                            <td>${survey.responses.toLocaleString()}</td>
                            <td>${survey.created}</td>
                        </tr>
                    `).join('');
                }
                
                // Populate activity
                const activityContainer = document.getElementById('dashboardActivity');
                if (activityContainer && state.activity.length) {
                    activityContainer.innerHTML = state.activity.slice(0, 4).map(activity => `
                        <div class="activity-item">
                            <div class="activity-icon">
                                <i class="fas ${activity.icon}"></i>
                            </div>
                            <div class="activity-content">
                                <div class="activity-title">${activity.title}</div>
                                <div class="activity-meta">${activity.meta}</div>
                            </div>
                        </div>
                    `).join('');
                }
            }
        });
    </script>
</body>
</html>
