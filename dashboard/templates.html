<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMR Templates | TalaanScan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body class="dashboard-layout">

    <main class="main-content">
        <header class="top-navbar">
            <div class="breadcrumbs">
                <a href="dashboard.html">Home</a> <i class="fas fa-chevron-right"></i>
                <span class="current">Templates</span>
            </div>
        </header>

        <div class="page-container">
            <div class="page-header flex-between align-center mb-4">
                <div>
                    <h1 class="page-title">OMR Templates</h1>
                    <p class="page-subtitle">Manage coordinate schemas for mobile scanning.</p>
                </div>
                <div style="display: flex; gap: 12px;">
                    <a href="upload-questionnaire.html" class="btn btn-outline"><i class="fas fa-magic"></i> AI Convert</a>
                    <a href="template-editor.html" class="btn btn-primary"><i class="fas fa-hammer"></i> Manual Builder</a>
                </div>
            </div>

            <div class="content-card">
                <div class="flex-between mb-4 toolbar-grid" style="gap: 16px;">
                    <div style="flex: 1; position: relative; max-width: 400px;">
                        <i class="fas fa-search input-icon"></i>
                        <input type="text" class="form-input with-icon" placeholder="Search templates...">
                    </div>
                    <select class="form-select">
                        <option value="all">All Sources</option>
                        <option value="ai">AI Generated</option>
                        <option value="manual">Manually Built</option>
                    </select>
                </div>

                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Template Name</th>
                                <th>Source</th>
                                <th>Questions</th>
                                <th>Last Updated</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="templatesBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script src="../js/templates.js"></script>
</body>
</html>
