<!-- dashboard/surveys.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Surveys | TalaanScan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body class="dashboard-layout">

    <main class="main-content">
        <header class="top-navbar">
            <div class="breadcrumbs">
                <a href="dashboard.html">Home</a> <i class="fas fa-chevron-right"></i>
                <span class="current">All Surveys</span>
            </div>
        </header>

        <div class="page-container">
            <div class="page-header flex-between align-center mb-4">
                <div>
                    <h1 class="page-title">Survey Campaigns</h1>
                    <p class="page-subtitle">Manage your data collection campaigns and monitor their progress.</p>
                </div>
                <a href="create-survey.html" class="btn btn-primary"><i class="fas fa-plus"></i> Create Survey</a>
            </div>

            <div class="content-card">
                <!-- Toolbar -->
                <div class="flex-between mb-4 toolbar-grid" style="gap: 16px;">
                    <div style="flex: 1; position: relative; max-width: 400px;">
                        <i class="fas fa-search input-icon"></i>
                        <input type="text" class="form-input with-icon" placeholder="Search surveys...">
                    </div>
                    <div style="display: flex; gap: 12px;">
                        <select class="form-select">
                            <option value="all">All Statuses</option>
                            <option value="active">Active</option>
                            <option value="draft">Draft</option>
                            <option value="closed">Closed</option>
                        </select>
                        <button class="btn btn-outline"><i class="fas fa-filter"></i> Filters</button>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="data-table" id="surveysTable">
                        <thead>
                            <tr>
                                <th>Survey Name</th>
                                <th>Template Used</th>
                                <th>Status</th>
                                <th>Responses</th>
                                <th>Created Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="surveysBody">
                            <!-- Populated by js/surveys.js -->
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="flex-between mt-4 align-center">
                    <p class="text-sm text-muted">Showing 1 to 5 of 12 surveys</p>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-outline btn-sm" disabled>Previous</button>
                        <button class="btn btn-primary btn-sm">1</button>
                        <button class="btn btn-outline btn-sm">2</button>
                        <button class="btn btn-outline btn-sm">Next</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script src="../js/surveys.js"></script>
</body>
</html>
