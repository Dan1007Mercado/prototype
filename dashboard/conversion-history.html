<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversion History | TalaanScan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/dashboard.css">
    <link rel="stylesheet" href="../css/conversion.css">
</head>
<body class="dashboard-layout">

    <main class="main-content">
        <header class="top-navbar">
            <div class="breadcrumbs">
                <a href="dashboard.html">Home</a> <i class="fas fa-chevron-right"></i>
                <a href="conversion-dashboard.html">AI Conversion</a> <i class="fas fa-chevron-right"></i>
                <span class="current">History</span>
            </div>
        </header>

        <div class="page-container">
            <div class="page-header flex-between align-center mb-4">
                <div>
                    <h1 class="page-title">Conversion History</h1>
                    <p class="page-subtitle">Log of all AI-processed questionnaires and their generated assets.</p>
                </div>
                <button class="btn btn-outline"><i class="fas fa-download"></i> Export Log</button>
            </div>

            <div class="content-card">
                <div class="flex-between mb-4" style="gap: 16px;">
                    <div style="flex: 1; position: relative;">
                        <i class="fas fa-search" style="position: absolute; left: 16px; top: 12px; color: var(--text-muted);"></i>
                        <input type="text" placeholder="Search by file name or ID..." style="width: 100%; padding: 10px 10px 10px 40px; border: 1px solid var(--border-color); border-radius: 8px;">
                    </div>
                    <select style="padding: 10px; border: 1px solid var(--border-color); border-radius: 8px;">
                        <option value="all">All Statuses</option>
                        <option value="completed">Completed</option>
                        <option value="processing">Processing</option>
                        <option value="failed">Failed</option>
                    </select>
                    <input type="date" style="padding: 10px; border: 1px solid var(--border-color); border-radius: 8px;">
                </div>

                <div class="table-responsive">
                    <table class="data-table" id="historyTable">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Original File</th>
                                <th>Date / Time</th>
                                <th>Status</th>
                                <th>Confidence</th>
                                <th>Pages</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="historyBody">
                            </tbody>
                    </table>
                </div>

                <div class="flex-between mt-4 align-center">
                    <p class="text-sm text-muted">Showing 1 to 10 of 1,284 entries</p>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn btn-outline btn-sm" disabled>Previous</button>
                        <button class="btn btn-primary btn-sm">1</button>
                        <button class="btn btn-outline btn-sm">2</button>
                        <button class="btn btn-outline btn-sm">3</button>
                        <button class="btn btn-outline btn-sm">Next</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/app.js"></script>
    <script src="../js/conversion-history.js"></script>
</body>
</html>
